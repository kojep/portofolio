<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Jevandry - Electrical Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'], 
                        heading: ['Poppins', 'sans-serif'], 
                        mono: ['Fira Code', 'monospace'] 
                    },
                    colors: { 
                        primary: '#FF6600', /* Asiimov/Prusa Orange */
                        primaryHover: '#CC5200', 
                        dark: '#121212', 
                        darker: '#000000', 
                        light: '#FFFFFF', 
                        surface: '#F4F4F5' 
                    },
                    boxShadow: {
                        'industrial': '6px 6px 0px 0px #121212',
                        'industrial-primary': '6px 6px 0px 0px #FF6600',
                        'industrial-sm': '3px 3px 0px 0px #121212'
                    }
                }
            }
        }
    </script>
    <style> 
        /* Asiimov Diagonal Stripes Pattern */
        .stripes-asiimov {
            background: repeating-linear-gradient(
                -45deg,
                #121212,
                #121212 10px,
                #FF6600 10px,
                #FF6600 20px
            );
        }
        .stripes-light {
            background: repeating-linear-gradient(
                -45deg,
                #ffffff,
                #ffffff 10px,
                #f4f4f5 10px,
                #f4f4f5 20px
            );
        }
        .industrial-badge { 
            background: #ffffff; 
            border: 2px solid #121212;
            box-shadow: 3px 3px 0px 0px #FF6600;
        } 
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); } 
        .reveal.active { opacity: 1; transform: translateY(0); } 
    </style>
</head>
